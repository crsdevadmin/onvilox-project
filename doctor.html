<!DOCTYPE html>
<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Gquence</title>
  <script src="/js/config.js"></script>
  <link rel="stylesheet" href="/css/app.css?v=2.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0e2247">
  <style>
    .filter-tab { padding:7px 16px; font-size:12px; font-weight:700; border-radius:20px; border:1.5px solid #d1d5db; background:#fff; color:#64748b; cursor:pointer; transition:all .15s; }
    .filter-tab:hover { border-color:#0e2247; color:#0e2247; }
    .filter-tab.active { background:#0e2247; color:#fff; border-color:#0e2247; }
    .btn-csd { background:#0e2247; color:#fff; border:none; padding:6px 10px; border-radius:6px; font-size:11px; font-weight:800; cursor:pointer; letter-spacing:.5px; display:flex; align-items:center; gap:4px; }
    .btn-csd:hover { background:#1a3a6e; }
    /* ── CSD PRINT STYLES ───────────────────────────── */
    @media print {
      body > *:not(#csdPrintDoc) { display: none !important; }
      #csdPrintDoc { display: block !important; }
      @page { size: A4 portrait; margin: 18mm 15mm 20mm 25mm; }
    }
    #csdPrintDoc {
      display: none;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 9.5pt;
      color: #111;
    }
    .cp-page { border: 2px solid #222; padding: 10pt 12pt 24pt; min-height: 257mm; page-break-after: always; position: relative; box-sizing: border-box; }
    .cp-page:last-child { page-break-after: auto; }
    .cp-logo { text-align:center; font-size:20pt; font-weight:bold; letter-spacing:3px; margin-bottom:2pt; }
    .cp-hr   { border:none; border-top:2px solid #222; margin:4pt 0; }
    .cp-prog { text-align:center; font-size:11pt; font-weight:bold; margin-bottom:2pt; }
    .cp-sub  { text-align:center; font-size:9pt; color:#555; margin-bottom:12pt; }
    .cp-banner { background:#333; color:#fff; padding:6pt 10pt; font-size:11pt; font-weight:bold; margin-bottom:6pt; }
    .cp-banner-sub { font-size:8pt; font-weight:normal; margin-top:1pt; }
    .cp-section { background:#d0d0d0; padding:3pt 6pt; font-size:9pt; font-weight:bold; margin-bottom:3pt; }
    .cp-table { width:100%; border-collapse:collapse; margin-bottom:6pt; }
    .cp-table td, .cp-table th { border:0.5pt solid #888; padding:4pt 5pt; vertical-align:middle; }
    .cp-table th { background:#e8e8e8; font-size:8.5pt; font-weight:bold; }
    .cp-lbl { background:#f5f5f5; font-weight:bold; width:42%; }
    .cp-val { width:58%; }
    .cp-filled { font-weight:bold; color:#0e2247; }
    .cp-blank  { color:#aaa; font-size:8pt; font-style:italic; }
    .cp-ruled { border:1pt solid #222; margin-bottom:6pt; }
    .cp-ruled-hdr { background:#d0d0d0; padding:3pt 6pt; font-size:8.5pt; font-weight:bold; border-bottom:0.5pt solid #888; }
    .cp-ruled-body { min-height:40pt; padding:4pt 6pt; font-size:9pt; }
    .cp-stamp { border:1.5pt solid #222; margin-bottom:8pt; }
    .cp-stamp-hdr { background:#d0d0d0; padding:3pt 6pt; font-size:8.5pt; font-weight:bold; border-bottom:0.5pt solid #888; }
    .cp-stamp-body { height:50pt; }
    .cp-sig { width:100%; border-collapse:collapse; }
    .cp-sig td { border:0.5pt solid #888; padding:4pt 6pt; font-size:8.5pt; height:36pt; vertical-align:top; }
    .cp-footer { position:absolute; bottom:0; left:0; right:0; background:#e8e8e8; padding:3pt 8pt; font-size:7.5pt; color:#555; display:flex; justify-content:space-between; border-top:1pt solid #aaa; }
    .cp-week th, .cp-week td { font-size:8pt; text-align:center; }
    .cp-week td:first-child { text-align:left; font-weight:bold; }
    .cp-daily th, .cp-daily td { font-size:8pt; text-align:center; height:14pt; }
    .cp-tox th, .cp-tox td { text-align:center; font-size:8.5pt; }
    .cp-tox td:first-child { text-align:left; padding-left:5pt; }
    @keyframes pulse {
      0% {
        opacity: 1;
      }

      50% {
        opacity: 0.5;
      }

      100% {
        opacity: 1;
      }
    }
  </style>
</head>

<body>

  <div class="topbar">
    <div class="logo">Gquence</div>
    <div class="nav">
      <span class="nav-pill" id="rolePill">DOCTOR</span>
      <a href="#" onclick="auth.logout()">Logout</a>
      <button id="themeToggleBtn" onclick="toggleTheme()" class="theme-toggle-btn" style="margin-left: 20px;">
        <span id="themeIcon">🌙</span> <span id="themeLabel">Dark</span>
      </button>
    </div>
  </div>


  <div class="container page">

    <div id="syncBanner" style="display:none;margin-bottom:16px;padding:14px 16px;border:1px solid #fed7aa;background:#fff7ed;border-radius:8px;">
      <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap;justify-content:space-between;">
        <div style="color:#9a3412;font-size:14px;">
          <b>⚠ Unsaved patient data on this device.</b>
          <span id="syncBannerMsg"></span>
        </div>
        <button id="syncNowBtn" class="btn-primary" onclick="syncLocalPatientsNow()">Sync to database</button>
      </div>
      <div id="syncBannerResult" style="margin-top:8px;font-size:13px;color:#166534;"></div>
    </div>

    <div class="page-header">
      <div>
        <h1 id="title" class="page-title">My Patients</h1>
        <div class="page-subtitle">Quickly review, approve and generate reports.</div>
      </div>

      <div class="toolbar">
        <div class="toolbar-field">
          <label class="sr-only" for="searchBox">Search</label>
          <input id="searchBox" class="input input-sm" type="search" placeholder="Search name / UHIC"
            autocomplete="off">
        </div>

        <div style="display:flex;gap:6px;flex-wrap:wrap;">
          <button onclick="setDocFilter('ALL')"     id="dtab-ALL"     class="filter-tab active">All</button>
          <button onclick="setDocFilter('PENDING')" id="dtab-PENDING" class="filter-tab">Not Approved</button>
          <button onclick="setDocFilter('APPROVED')" id="dtab-APPROVED" class="filter-tab">Approved</button>
        </div>

        <a class="btn-primary btn-sm" href="/patients/create">+ Create Patient</a>
      </div>
    </div>

    <div class="kpis">
      <div class="kpi-card">
        <div class="kpi-label">Total</div>
        <div class="kpi-value" id="kpiTotal">0</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Pending Approval</div>
        <div class="kpi-value" id="kpiPending">0</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">In Progress</div>
        <div class="kpi-value" id="kpiProgress">0</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Ready / Delivered</div>
        <div class="kpi-value" id="kpiReady">0</div>
      </div>
    </div>

    <div class="card">
      <table class="table">
        <thead>
          <tr>
            <th>Patient</th>
            <th>UHIC</th>
            <th>Cancer</th>
            <th>Created</th>
            <th>Status</th>
            <th class="th-actions">Actions</th>
          </tr>
        </thead>
        <tbody id="patientTable"></tbody>
      </table>
    </div>

  </div>


  <!-- QR Modal -->
  <div id="qrOverlay" class="modal-overlay" onclick="closeQr()">
    <div class="modal" onclick="event.stopPropagation();">
      <div class="modal-header">
        <h3 class="modal-title" id="qrTitle">Patient QR</h3>
        <button class="modal-close" aria-label="Close" onclick="closeQr()">×</button>
      </div>
      <div class="modal-body">
        <div id="qrBox" style="display:flex;justify-content:center;padding:10px 0;"></div>
        <div style="text-align:center;color:#6b7280;font-size:13px;" id="qrHint">Scan to view patient summary</div>
        <div class="modal-actions" style="justify-content:center;">
          <button class="btn-secondary" onclick="copyQrLink()">Copy Link</button>
          <button class="btn-primary" onclick="openQrLink()">Open Link</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/storage.js?v=3.1"></script>
  <script src="/js/seed.js?v=3.1"></script>
  <script src="/js/auth.js?v=3.1"></script>
  <script src="/js/mappings.js?v=3.1"></script>
  <script src="/js/patient-store.js?v=3.2"></script>
  <script src="/js/nutrition-engine-v4.js?v=3.9"></script>
  <script src="/js/engine-config.js"></script>
  <script src="/js/manufacturing.js?v=3.1"></script>
  <script src="/js/ai-report-service.js?v=3.2"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <script>
    console.log("ONVILOX_STABLE_V4_FIXED_LOADED");
    // INTAKE CALCULATOR LOGIC
    auth.requireRole(['DOCTOR', 'ASSISTANT']);
    loadEngineConfig(); // Part 3: load formula constants + active rules from DB
    const me = auth.getCurrentUser();

    // Top-right role pill
    const rolePill = document.getElementById('rolePill');
    if (rolePill) rolePill.textContent = me.role;

    // In-memory tracker for AI background tasks
    const __aiTriggers = {};
    const __aiErrors = {};

    // Filters
    let searchQuery = '';
    let statusQuery = 'ALL';

    const searchBox = document.getElementById('searchBox');

    if (searchBox) {
      searchBox.addEventListener('input', (e) => {
        searchQuery = (e.target.value || '').trim().toLowerCase();
        render();
      });
    }

    function setDocFilter(f) {
      statusQuery = f;
      ['ALL','PENDING','APPROVED'].forEach(k => {
        const btn = document.getElementById('dtab-' + k);
        if (btn) btn.classList.toggle('active', k === f);
      });
      render();
    }


    if (me.role === 'ASSISTANT') {
      document.getElementById('title').innerText = "Doctor's Patients";
    }


    function render() {
      const table = document.getElementById('patientTable');
      table.innerHTML = '';

      let doctorId = me.id;
      if (me.role === 'ASSISTANT') {
        doctorId = mappingService.getDoctorForAssistant(me.id);
      }

      const patients = getPatients().filter(p => p.assignedDoctorId === doctorId);
      patients.sort((a, b) => (b.createdAt || '').localeCompare(a.createdAt || ''));

      // KPI counts (based on all patients for this doctor)
      const total = patients.length;
      const pending = patients.filter(p => (p.status || 'CREATED') === 'CREATED').length;
      const progress = patients.filter(p => ['APPROVED', 'PROCESSING', 'DISPATCHED'].includes(p.status || '')).length;
      const ready = patients.filter(p => ['READY', 'DELIVERED'].includes(p.status || '')).length;

      const setKpi = (id, val) => {
        const el = document.getElementById(id);
        if (el) el.textContent = String(val);
      };
      setKpi('kpiTotal', total);
      setKpi('kpiPending', pending);
      setKpi('kpiProgress', progress);
      setKpi('kpiReady', ready);

      // Apply filters for table view
      const filtered = patients.filter(p => {
        const status = p.status || 'CREATED';
        if (statusQuery === 'PENDING' && status !== 'CREATED') return false;
        if (statusQuery === 'APPROVED' && status === 'CREATED') return false;
        if (statusQuery !== 'ALL' && statusQuery !== 'PENDING' && statusQuery !== 'APPROVED' && status !== statusQuery) return false;

        if (searchQuery) {
          const name = (p.name || '').toLowerCase();
          const uhic = (p.uhic || '').toLowerCase();
          if (!name.includes(searchQuery) && !uhic.includes(searchQuery)) return false;
        }
        return true;
      });

      filtered.forEach(p => {
        const status = p.status || 'CREATED';
        const statusClass = status.toLowerCase();


        // Compute a quick nutrition preview (engine output). Full plan/overrides live in Patient-Profile-STABLE-V3.html; page.
        let preview = null;
        try {
          const patientForCalc = Object.assign({}, p, {
            weight: parseFloat(p.weight),
            height: parseFloat(p.height),
            albumin: parseFloat(p.albumin),
            weightLossPercent: parseFloat(p.weightLossPercent || 0),
            giIssues: !!p.giIssues
          });
          preview = generateNutritionPlan(patientForCalc);
        } catch (e) { /* ignore */ }

        const latestPlan = getLatestPlanForPatient(p.id);
        // A job that has been "generating" longer than this is treated as orphaned
        // (server restart, lost in-memory job, or Claude timeout) and shown as FAILED
        // instead of spinning on ANALYZING forever. 7 min > the 6-min frontend poll timeout.
        const AI_FAIL_TTL = 7 * 60 * 1000;

        // A plan with claudeInsights.generating=true (set recently) counts as locked — don't re-trigger.
        // This lock is written to the DB so it works across devices and logins, not just tabs.
        const ci = latestPlan && latestPlan.claudeInsights;
        const lockAge = (ci && ci.generating === true) ? (Date.now() - (ci.startedAt || 0)) : 0;
        const isGenerating = ci && ci.generating === true && lockAge < AI_FAIL_TTL;
        const staleLock = ci && ci.generating === true && lockAge >= AI_FAIL_TTL; // orphaned job
        const hasAI = !!(ci && !ci.generating);
        const failed = !!__aiErrors[p.id] || staleLock;

        const failTitle = (__aiErrors[p.id] || 'AI analysis did not complete (the job timed out or was lost). Click to retry.').replace(/"/g, '&quot;');
        const aiStatus = hasAI
          ? '<span class="status ready" style="background:#dcfce7; color:#166534; font-size:10px; margin-left:5px;">AI READY</span>'
          : failed
            ? `<span class="status" onclick="event.stopPropagation(); retryAI('${p.id}')" style="background:#fee2e2; color:#991b1b; font-size:10px; margin-left:5px; cursor:pointer;" title="${failTitle}">⚠ AI FAILED · Retry</span>`
            : '<span class="status processing" style="background:#fef9c3; color:#854d0e; font-size:10px; margin-left:5px; animation: pulse 1.5s infinite;">ANALYZING...</span>';

        // CSD button — only when APPROVED (doctor role or assistant)
        const csdBtn = (status !== 'CREATED')
          ? `<button class="btn-csd" onclick="event.stopPropagation(); printCSD('${p.id}')" title="Print Clinical Source Document (CSD)">
               <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" fill="currentColor" viewBox="0 0 16 16"><path d="M5 1a2 2 0 0 0-2 2v1h10V3a2 2 0 0 0-2-2H5zm6 8H5a1 1 0 0 0-1 1v3a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1v-3a1 1 0 0 0-1-1z"/><path d="M0 7a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v3a2 2 0 0 1-2 2h-1v-2a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v2H2a2 2 0 0 1-2-2V7zm2.5 1a.5.5 0 1 0 0-1 .5.5 0 0 0 0 1z"/></svg>
               CSD
             </button>`
          : '';

        const approveBtn = (me.role === 'DOCTOR' && status === 'CREATED')
          ? `<button class="btn-warning" style="padding:6px 12px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:5px;${!hasAI ? 'opacity:0.5;pointer-events:none;' : ''}" title="${hasAI ? 'Approve' : 'Analyzing...'}" onclick="event.stopPropagation(); quickApprove('${p.id}', this)"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16"><path d="M10.97 4.97a.75.75 0 0 1 1.07 1.05l-3.99 4.99a.75.75 0 0 1-1.08.02L4.324 8.384a.75.75 0 1 1 1.06-1.06l2.094 2.093 3.473-4.425a.267.267 0 0 1 .02-.022z"/></svg> Approve</button>`
          : '';

        // Trigger AI whenever insights are missing and not already in-flight (per-tab) or locked in DB (cross-device).
        const planExists = !!(latestPlan && (latestPlan.finalPlan || latestPlan.engineOutput));
        if (!hasAI && !isGenerating && !failed && !__aiTriggers[p.id]) {
          __aiTriggers[p.id] = true;

          // Write server-side lock immediately so other devices/users see this patient is being processed.
          const _lockPlan = async () => {
            const lock = { generating: true, startedAt: Date.now() };
            if (latestPlan && latestPlan.id) {
              // Plan exists — PATCH just the insights field (lightweight)
              latestPlan.claudeInsights = lock;
              await fetch(`${(typeof CONFIG !== 'undefined' ? CONFIG.API_BASE_URL : '')}/api/nutrition-plans/${latestPlan.id}/insights`,
                { method: 'PATCH', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + (auth.getCurrentUser().token || '') },
                  body: JSON.stringify({ insights: lock }) });
            }
            // For brand-new patients (no plan yet), the lock will be included in the POST below.
          };

          const _clearLock = async (planId) => {
            if (!planId) return;
            await fetch(`${(typeof CONFIG !== 'undefined' ? CONFIG.API_BASE_URL : '')}/api/nutrition-plans/${planId}/insights`,
              { method: 'PATCH', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + (auth.getCurrentUser().token || '') },
                body: JSON.stringify({ insights: null }) }).catch(() => {});
          };

          const _saveInsights = async (data) => {
            // Ensure plan exists in cache/DB
            let freshPlan = getLatestPlanForPatient(p.id) || latestPlan;
            if (freshPlan) {
              freshPlan.claudeInsights = data;
              updatePlan(freshPlan);
            } else {
              const engineOutput = generateNutritionPlan(p);
              const newPlan = createOrUpdatePlan(p, engineOutput, {}, 'Auto-trigger from dashboard');
              newPlan.claudeInsights = data;
              savePlan(newPlan);
              freshPlan = newPlan;
            }

            // Reliably persist insights via dedicated PATCH endpoint.
            // updatePlan/savePlan are fire-and-forget and swallow errors silently —
            // this PATCH is the authoritative save that prevents re-triggering on next load.
            const planId = freshPlan && freshPlan.id;
            if (planId) {
              const apiBase = (typeof CONFIG !== 'undefined' ? CONFIG.API_BASE_URL : '');
              const token = auth.getCurrentUser().token || '';

              const _patch = async () => {
                const res = await fetch(`${apiBase}/api/nutrition-plans/${planId}/insights`, {
                  method: 'PATCH',
                  headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                  body: JSON.stringify({ insights: data })
                });
                return res.ok ? res.json() : Promise.reject(new Error(`PATCH ${res.status}`));
              };

              // Retry up to 3 times in case of transient server error
              for (let attempt = 1; attempt <= 3; attempt++) {
                try {
                  const result = await _patch();
                  if (result.rowCount === 0) {
                    // Plan exists in localStorage but NOT in DB — POST it first, then PATCH
                    console.warn('Plan not in DB — saving plan first then re-patching insights');
                    await fetch(`${apiBase}/api/nutrition-plans`, {
                      method: 'POST',
                      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                      body: JSON.stringify(freshPlan)
                    });
                    await _patch(); // Now PATCH with plan in DB
                  }
                  break;
                } catch(e) {
                  console.warn(`PATCH insights attempt ${attempt} error:`, e.message);
                  if (attempt < 3) await new Promise(r => setTimeout(r, 2000 * attempt));
                }
              }
              _clearLock(planId);
            }
          };

          _lockPlan().then(() =>
            aiReportService.generateInsights(p, latestPlan || generateNutritionPlan(p))
          ).then(async data => {
            await _saveInsights(data);
            render();
          }).catch(err => {
            console.error("Dashboard AI Trigger Failed:", err);
            delete __aiTriggers[p.id];
            __aiErrors[p.id] = err.message || 'AI generation failed';
            const planId = (getLatestPlanForPatient(p.id) || latestPlan || {}).id;
            _clearLock(planId);
            render();
          });
        }

        const mainRow = document.createElement('tr');
        mainRow.className = 'patient-row';
        mainRow.style.cursor = 'pointer';
        mainRow.onclick = () => toggleDetails(p.id);

        mainRow.innerHTML = `
      <td><button class="linklike" onclick="showQr(\'${p.id}\');event.stopPropagation();" title="Show QR for patient">${p.name}</button></td>
      <td>${p.uhic}</td>
      <td>${p.cancer}</td>
      <td>${p.createdDate || '-'}</td>
      <td><span class="status ${statusClass}">${status}</span>${aiStatus}</td>
      <td>
        <div class="action-row" onclick="event.stopPropagation();" style="display:flex; gap:8px;">
          ${approveBtn}
          <a href="/patients/profile?id=${p.id}" class="btn-primary" style="padding: 6px 10px; border-radius: 6px; display:flex; align-items:center; justify-content:center; ${!hasAI ? 'opacity:0.5; pointer-events:none;' : ''}" title="${hasAI ? 'Edit / Report' : 'Analyzing clinical data...'}">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M12.146.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1 0 .708l-10 10a.5.5 0 0 1-.168.11l-5 2a.5.5 0 0 1-.65-.65l2-5a.5.5 0 0 1 .11-.168l10-10zM11.207 2.5 13.5 4.793 14.793 3.5 12.5 1.207 11.207 2.5zm1.586 3L10.5 3.207 4 9.707V10h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.293l6.5-6.5zm-9.761 5.175-.106.106-1.528 3.821 3.821-1.528.106-.106A.5.5 0 0 1 5 12.5V12h-.5a.5.5 0 0 1-.5-.5V11h-.5a.5.5 0 0 1-.468-.325z"/></svg>
          </a>
          <button class="btn-secondary" onclick="openPdf('${p.id}', this)" style="padding: 6px 10px; border-radius: 6px; display:flex; align-items:center; justify-content:center; ${!hasAI ? 'opacity:0.5; pointer-events:none;' : ''}" title="${hasAI ? 'Download PDF' : 'Analyzing clinical data...'}">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5z"/><path d="M7.646 11.854a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 10.293V1.5a.5.5 0 0 0-1 0v8.793L5.354 8.146a.5.5 0 1 0-.708.708l3 3z"/></svg>
          </button>
          ${csdBtn}
          <button class="btn-secondary" onclick="confirmDelete('${p.id}', '${p.name.replace(/'/g, "\\'")}')" style="padding: 6px 10px; border-radius: 6px; display:flex; align-items:center; justify-content:center; color:#dc2626;" title="Delete Patient Record">

    // Show a banner if this device holds patients that never reached the database.
    function checkLocalUnsynced() {
      try {
        if (typeof getUnsyncedPatients !== 'function') return;
        const who = (typeof me !== 'undefined' && me) ? me : auth.getCurrentUser();
        let docId = who.id;
        if (who.role === 'ASSISTANT' && typeof mappingService !== 'undefined') {
          docId = mappingService.getDoctorForAssistant(who.id);
        }
        const unsynced = getUnsyncedPatients().filter(p => p.assignedDoctorId === docId || !p.assignedDoctorId);
        const banner = document.getElementById('syncBanner');
        if (!banner) return;
        if (unsynced.length) {
          const names = unsynced.map(p => p.name || '(unnamed)').join(', ');
          document.getElementById('syncBannerMsg').textContent =
            ' ' + unsynced.length + ' patient(s) are saved only on this device and not in the database: ' + names + '.';
          banner.style.display = 'block';
        } else {
          banner.style.display = 'none';
        }
      } catch (e) { console.warn('checkLocalUnsynced failed:', e.message); }
    }

    async function syncLocalPatientsNow() {
      const btn = document.getElementById('syncNowBtn');
      const result = document.getElementById('syncBannerResult');
      if (btn) { btn.disabled = true; btn.textContent = 'Syncing…'; }
      try {
        const r = await pushUnsyncedToServer();
        if (result) {
          result.textContent = 'Synced ' + r.patientsOk + ' of ' + r.attempted +
            ' patient(s)' + (r.plansOk ? ' and ' + r.plansOk + ' plan(s)' : '') + ' to the database.';
        }
        // Re-check; hide the banner if everything is now saved.
        checkLocalUnsynced();
        render();
        if (btn) { btn.textContent = 'Sync to database'; btn.disabled = false; }
      } catch (e) {
        if (result) { result.style.color = '#dc2626'; result.textContent = 'Sync failed: ' + e.message + '. Please try again.'; }
        if (btn) { btn.textContent = 'Retry sync'; btn.disabled = false; }
      }
    }
    window.syncLocalPatientsNow = syncLocalPatientsNow;


    let __qrCurrentLink = '';

    function getBaseUrlForQr() {
      try {
        const cfg = localStorage.getItem('onvilox_public_base_url');
        if (cfg && /^https?:\/\//i.test(cfg)) return cfg.replace(/\/$/, '');
      } catch (e) { }

      // Always use an absolute URL so phones can scan
      let base = window.location.origin;

      if (base === 'null' || base === 'file://') {
        return 'http://192.168.1.8:8000'; // Fallback
      }

      const path = window.location.pathname;
      const dir = path.substring(0, path.lastIndexOf('/'));
      return base + dir;
    }

    function buildQrLink(patientId) {
      const base = getBaseUrlForQr();
      return `${base}/patient-qr.html?id=${encodeURIComponent(patientId)}`;
    }


    function showQr(patientId) {
      const p = getPatientById(patientId);
      const title = p ? `QR for ${p.name}` : 'Patient QR';
      document.getElementById('qrTitle').innerText = title;

      const link = buildQrLink(patientId);
      __qrCurrentLink = link;

      const box = document.getElementById('qrBox');
      box.innerHTML = '';
      new QRCode(box, { text: link, width: 220, height: 220 });

      const isFile = (window.location.origin === 'null');
      if (isFile && !localStorage.getItem('onvilox_public_base_url')) {
        document.getElementById('qrHint').innerText = 'Warning: Local URLs cannot be scanned by phones. Ensure you are running this on a reachable IP address (e.g. your WiFi IP) and set localStorage key "onvilox_public_base_url".';
      } else {
        document.getElementById('qrHint').innerText = 'Scan to view patient report';
      }
      document.getElementById('qrOverlay').style.display = 'flex';
    }

    async function copyQrLink() {
      if (!__qrCurrentLink) return;
      try {
        await navigator.clipboard.writeText(__qrCurrentLink);
        document.getElementById('qrHint').innerText = 'Link copied ✅';
      } catch (e) {
        prompt('Copy this link:', __qrCurrentLink);
      }
    }

    function openQrLink() {
      if (!__qrCurrentLink) return;
      window.open(__qrCurrentLink, '_blank', 'noopener');
    }

    function openPdf(patientId, btn) {
      // Render in a hidden off-screen iframe — no new tab opens
      if (btn) { btn.disabled = true; btn.title = 'Preparing PDF...'; }

      const url = `/patients/profile?id=${encodeURIComponent(patientId)}&print=1`;
      const iframe = document.createElement('iframe');
      iframe.setAttribute('data-pdf-iframe', patientId);
      // Off-screen but with real dimensions so html2canvas can capture the DOM
      iframe.style.cssText = 'position:fixed;left:-9999px;top:0;width:1400px;height:900px;border:none;';
      document.body.appendChild(iframe);

      const cleanup = () => {
        if (iframe.parentNode) iframe.parentNode.removeChild(iframe);
        if (btn) { btn.disabled = false; btn.title = 'Download PDF'; }
      };
      // Safety timeout: remove iframe after 45s regardless
      const timeout = setTimeout(cleanup, 45000);

      window.addEventListener('message', function handler(e) {
        if (e.data && e.data.type === 'pdfReady' && e.data.patientId === patientId) {
          clearTimeout(timeout);
          window.removeEventListener('message', handler);
          setTimeout(cleanup, 1500); // slight delay so download can start
        }
      });

      iframe.src = url;
    }

    // Clear a failed/orphaned AI state and kick off a fresh analysis.
    async function retryAI(patientId) {
      delete __aiErrors[patientId];
      delete __aiTriggers[patientId];
      const plan = getLatestPlanForPatient(patientId);
      if (plan && plan.claudeInsights && plan.claudeInsights.generating) {
        plan.claudeInsights = null; // clear the orphaned lock in the in-memory cache
        try {
          const apiBase = (typeof CONFIG !== 'undefined' ? CONFIG.API_BASE_URL : '');
          await fetch(`${apiBase}/api/nutrition-plans/${plan.id}/insights`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + ((auth.getCurrentUser() || {}).token || '') },
            body: JSON.stringify({ insights: null })
          });
        } catch (e) { /* best effort — render() below will re-trigger regardless */ }
      }
      render(); // re-render → the trigger condition fires a fresh analysis
    }
    window.retryAI = retryAI;

    async function quickApprove(patientId, btn) {
      const patient = getPatientById(patientId);
      if (!patient) return alert('Patient not found.');
      if (patient.status !== 'CREATED') return alert('Patient is already approved or in production.');

      if (btn) { btn.disabled = true; btn.textContent = 'Approving...'; }

      // Get storeId
      const storeId = mappingService.getStoreForDoctor(me.id);
      if (!storeId) {
        if (btn) { btn.disabled = false; btn.textContent = 'Approve'; }
        return alert('Doctor is not mapped to a store. Admin must map doctor → store.');
      }

      // Approve
      patient.status = 'APPROVED';
      patient.approvedAt = new Date().toISOString();
      patient.approvedBy = me.id;
      patient.approvedByName = me.name || me.username || 'Doctor';
      patient.storeId = storeId;

      try {
        await updatePatient(patient);
        const existingJob = manufacturingService.getJobByPatient(patient.id);
        if (!existingJob) {
          manufacturingService.createJob({ patientId: patient.id, storeId, doctorId: me.id });
        }
        render();
        alert(`✓ ${patient.name} approved and sent to production.`);
      } catch(e) {
        if (btn) { btn.disabled = false; btn.textContent = 'Approve'; }
        alert('Approval failed: ' + e.message);
      }
    }

    function confirmDelete(id, name) {
      if (confirm(`CRITICAL ACTION: Are you sure you want to permanently delete the record for "${name}"? This will also remove all their nutrition plans and manufacturing history.`)) {
        if (deletePatient(id)) {
           render(); // Refresh the list
        }
      }
    }

        ['CRP (mg/L)',             p.crp||''],
        ['Creatinine (mg/dL)',     p.creatinine||''],
        ['Blood Glucose (mg/dL)',  p.bloodSugar||''],
        ['Hemoglobin (g/dL)',      p.hemoglobin||'']
      ])}
      <div class="cp-section">Section C – Toxicity Review (Worst Grade This Week)</div>
      ${wkTable('Toxicity', [
        ['Mucositis',         p.toxMucositis ? 'G'+p.toxMucositis : 'G0'],
        ['Dysphagia',         p.toxDysphagia ? 'G'+p.toxDysphagia : 'G0'],
        ['Xerostomia',        p.toxXerostomia ? 'G'+p.toxXerostomia : 'G0'],
        ['Nausea / Vomiting', p.toxNausea ? 'G'+p.toxNausea : 'G0'],
        ['Diarrhea',          p.toxDiarrhea ? 'G'+p.toxDiarrhea : 'G0'],
        ['Fatigue',           '—']
      ])}
      <div class="cp-section">Section D – Formula Compliance</div>
      <table class="cp-table" style="margin-bottom:6pt;">
        ${blk('Formula Prescribed (sachets/day)')}
        ${blk('Formula Consumed (sachets/day)')}
        ${blk('Compliance (%)')}
        ${blk('Reason for Non-Compliance (if any)')}
      </table>
      <div class="cp-ruled" style="min-height:44pt;">
        <div class="cp-ruled-hdr">Weekly Dietitian Notes &amp; Plan</div>
      </div>
      ${footer(4)}
    </div>`;

    /* ── FORM 4 — PRODUCT ACCOUNTABILITY ──────────────── */
    const paRows = Array.from({length:20},()=>`<tr><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>`).join('');
    const form4 = `
    <div class="cp-page">
      <div class="cp-banner">FORM 4 – PRODUCT ACCOUNTABILITY LOG
        <div class="cp-banner-sub">Study ID: ${studyId} &nbsp;|&nbsp; Patient: ${p.name}</div>
      </div>
      <table class="cp-table cp-daily">
        <tr>
          <th style="width:10%">Date</th><th style="width:13%">Batch No.</th><th style="width:10%">Formula</th>
          <th style="width:12%">Issued</th><th style="width:12%">Returned</th><th style="width:12%">Net Used</th>
          <th style="width:14%">Dispenser Sign</th><th>Remarks</th>
        </tr>
        ${paRows}
      </table>
      <div class="cp-ruled" style="min-height:36pt;margin-top:6pt;">
        <div class="cp-ruled-hdr">Product Accountability Notes</div>
      </div>
      ${footer(5)}
    </div>`;

    /* ── FORM 5 — FINAL OUTCOME ───────────────────────── */
    const ecogLabel = p.ecogStatus !== undefined && p.ecogStatus !== '' ? 'Grade ' + p.ecogStatus : '';
    const ocRows = [
      ['Weight (kg)',          p.weight||''],
      ['BMI (kg/m²)',          bmi||''],
      ['Serum Albumin (g/dL)',p.albumin||''],
      ['CRP (mg/L)',           p.crp||''],
      ['ECOG Score',           ecogLabel],
      ['Oral Intake (%)',      oralIntake||''],
      ['Grip Strength (kg)',   p.handGrip||''],
      ['Hemoglobin (g/dL)',    p.hemoglobin||''],
    ];
    const form5 = `
    <div class="cp-page">
      <div class="cp-banner">FORM 5 – FINAL OUTCOME ASSESSMENT
        <div class="cp-banner-sub">Study ID: ${studyId} &nbsp;|&nbsp; Patient: ${p.name}</div>
      </div>
      <div class="cp-section">Section A – Outcome Comparison</div>
      <table class="cp-table cp-week" style="margin-bottom:6pt;">
        <tr><th style="text-align:left;width:28%">Parameter</th><th>Baseline</th><th>Final</th><th>Change (Δ)</th><th>Clinical Note</th></tr>
        ${ocRows.map(([pr,base])=>`<tr><td style="text-align:left;font-weight:bold;">${pr}</td><td style="font-weight:bold;color:#0e2247;">${base}</td><td></td><td></td><td></td></tr>`).join('')}
      </table>
      <div class="cp-section">Section B – Treatment Outcome</div>
      <table class="cp-table" style="margin-bottom:6pt;">
        <tr><td class="cp-lbl">RT Completion</td><td class="cp-val">□ RT Completed &nbsp;&nbsp; □ RT Interrupted &nbsp;&nbsp; □ Treatment Ongoing</td></tr>
        <tr><td class="cp-lbl">Interruption Duration / Reason</td><td class="cp-val cp-blank">— fill on paper —</td></tr>
        <tr><td class="cp-lbl">Hospital Admission During RT</td><td class="cp-val">□ Yes &nbsp;&nbsp; □ No</td></tr>
        <tr><td class="cp-lbl">Feeding Tube Required</td><td class="cp-val">□ Yes &nbsp;&nbsp; □ No</td></tr>
        <tr><td class="cp-lbl">Date of RT Completion</td><td class="cp-val cp-blank">— fill on paper —</td></tr>
        <tr><td class="cp-lbl">Total Fractions Given</td><td class="cp-val cp-blank">— fill on paper —</td></tr>
      </table>
      <div class="cp-section">Section C – Global Clinical Assessment</div>
      <table class="cp-table" style="margin-bottom:6pt;">
        <tr><td class="cp-lbl">Overall Clinical Assessment</td><td class="cp-val">□ Improved &nbsp;&nbsp; □ Stable &nbsp;&nbsp; □ Deteriorated</td></tr>
        <tr><td class="cp-lbl">Overall Nutritional Status</td><td class="cp-val cp-blank">— fill on paper —</td></tr>
        <tr><td class="cp-lbl">Exit Status</td><td class="cp-val cp-blank">— fill on paper —</td></tr>
      </table>
      <div class="cp-ruled" style="min-height:48pt;">
        <div class="cp-ruled-hdr">Final Assessment Summary (Dietitian)</div>
      </div>
      <table class="cp-sig">
        <tr><td>Dietitian Signature: _____________</td><td>Physician Co-Sign: ______________</td></tr>
        <tr><td>Date: ___________________________</td><td></td></tr>
      </table>
      ${footer(6)}
    </div>`;

    /* ── FORM 6 — PHYSICIAN FEEDBACK ─────────────────── */
    const form6 = `
    <div class="cp-page">
      <div class="cp-banner">FORM 6 – PHYSICIAN FEEDBACK
        <div class="cp-banner-sub">Completed by Treating Physician at study end &nbsp;|&nbsp; Study ID: ${studyId}</div>
      </div>
      <table class="cp-table" style="margin-bottom:8pt;">
        ${row('Patient Name', fv(p.name))}
        ${row('Study ID',     fv(studyId))}
        ${row('Physician',    fv(p.approvedByName))}
      </table>
      <div class="cp-section">Feedback Questions</div>
      <table class="cp-table" style="margin-bottom:8pt;">
        ${blk('Was the nutrition monitoring report useful?')}
        ${blk('Was the formula clinically appropriate?')}
        ${blk('Did nutritional support impact RT completion?')}
        ${blk('Would you recommend this program?')}
        ${blk('Overall satisfaction with the program')}
      </table>
      <div class="cp-ruled" style="min-height:60pt;"><div class="cp-ruled-hdr">Physician Comments &amp; Suggestions</div></div>
      <table class="cp-sig" style="margin-top:6pt;">
        <tr><td>Name: ___________________________</td><td>Designation: ___________________</td></tr>
        <tr><td>Department: _____________________</td><td>Date: _________________________</td></tr>
        <tr><td colspan="2">Signature:</td></tr>
      </table>
      ${footer(7)}
    </div>`;

    /* ── FORM 7 — PATIENT FEEDBACK ────────────────────── */
    const pfItems = ['Taste &amp; Palatability','Tolerance (GI)','Ease of Preparation','Overall Satisfaction','Willingness to Continue'];
    const form7 = `
    <div class="cp-page">
      <div class="cp-banner">FORM 7 – PATIENT FEEDBACK
        <div class="cp-banner-sub">Completed by Patient / Caregiver &nbsp;|&nbsp; Study ID: ${studyId}</div>
      </div>
      <table class="cp-table" style="margin-bottom:8pt;">
        ${row('Patient Name', fv(p.name))}
        ${row('Study ID',     fv(studyId))}
        ${row('Cancer Site',  fv(p.cancer))}
      </table>
      <div class="cp-section">Section A – Product Experience</div>
      <table class="cp-table cp-tox" style="margin-bottom:8pt;">
        <tr><th style="text-align:left;width:35%">Parameter</th><th>Excellent</th><th>Good</th><th>Fair</th><th>Poor</th><th>Comments</th></tr>
        ${pfItems.map(i=>`<tr><td style="text-align:left;">${i}</td><td>□</td><td>□</td><td>□</td><td>□</td><td></td></tr>`).join('')}
      </table>
      <div class="cp-section">Section B – Adherence</div>
      <table class="cp-table" style="margin-bottom:8pt;">
        ${blk('Did you take formula as advised every day?')}
        ${blk('Main reason for missing doses (if any)')}
        ${blk('Did caregivers support formula use?')}
        ${blk('Would you recommend this to other patients?')}
      </table>
      <div class="cp-ruled" style="min-height:52pt;"><div class="cp-ruled-hdr">Patient / Caregiver Open Comments</div></div>
      <div style="border:1pt solid #222;padding:6pt;font-size:8.5pt;margin-top:4pt;">
        I confirm the above information is accurate to the best of my knowledge.<br><br>
        <b>Name:</b> _____________________________
        &nbsp;&nbsp;<b>Signature:</b> ____________________
        &nbsp;&nbsp;<b>Date:</b> ___________
      </div>
      ${footer(8)}
    </div>`;

    // ── Inject & print ───────────────────────────────────
    const doc = document.getElementById('csdPrintDoc');
    doc.innerHTML = cover + form1 + form2 + form3 + form4 + form5 + form6 + form7;
    setTimeout(() => window.print(), 200);
  }
  window.printCSD = printCSD;
  </script>
</body>

</html>
