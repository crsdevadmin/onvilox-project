<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Store Dashboard - Gquence</title>
  <link rel="stylesheet" href="/css/app.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0e2247">
  <style>
    .filter-tab { padding:7px 16px; font-size:12px; font-weight:700; border-radius:20px; border:1.5px solid #d1d5db; background:#fff; color:#64748b; cursor:pointer; transition:all .15s; }
    .filter-tab:hover:not(:disabled) { border-color:#0e2247; color:#0e2247; }
    .filter-tab.active { background:#0e2247; color:#fff; border-color:#0e2247; }
    .filter-tab:disabled { opacity:0.35; cursor:not-allowed; }
  </style>
</head>
<body>

<div class="topbar">
  <div class="logo">Gquence Store</div>
  <div class="nav">
    <a href="/store">Dashboard</a>
    <a href="#" onclick="auth.logout()">Logout</a>
    <button id="themeToggleBtn" onclick="toggleTheme()" class="btn-secondary btn-sm" style="margin-left: 20px; border-radius: 30px; padding: 6px 14px; cursor: pointer;">🌙 Dark Mode</button>
  </div>
</div>

<div class="container page">

  <div class="card" style="padding:12px 20px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px;">
    <div style="font-size:13px; color:#64748b;" id="notifStatus">🔔 Notifications: checking...</div>
    <button onclick="testPushNotification()" style="background:#0e2247;color:#fff;border:none;border-radius:6px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;">Send Test Notification</button>
  </div>

  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:14px;">
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
        <h2 style="margin:0;" id="queueTitle">Production Queue</h2>
        <span id="roleChip" style="font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:#0e2247;background:#e2e8f0;border-radius:999px;padding:3px 10px;"></span>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;" id="statusTabs">
        <button onclick="setFilter('ALL')"        id="tab-ALL"        class="filter-tab active">All</button>
        <button onclick="setFilter('APPROVED')"   id="tab-APPROVED"   class="filter-tab">Open</button>
        <button onclick="setFilter('PENDING')"    id="tab-PENDING"    class="filter-tab">Pending Approval</button>
        <button onclick="setFilter('PROCESSING')" id="tab-PROCESSING" class="filter-tab">Processing</button>
        <button onclick="setFilter('DISPATCHED')" id="tab-DISPATCHED" class="filter-tab">Dispatched</button>
      </div>
    </div>

    <table>
      <thead>
        <tr>
          <th>Doctor</th>
          <th>Patient</th>
          <th>Age / Gender</th>
          <th>UHID</th>
          <th>Cancer</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="jobTable"></tbody>
    </table>
  </div>

</div>


<!-- QR Modal -->
<div id="qrOverlay" class="modal-overlay" onclick="closeQr()">
  <div class="modal" onclick="event.stopPropagation();">
    <div class="modal-header">
      <h3 class="modal-title" id="qrTitle">Patient QR</h3>
      <button class="modal-close" aria-label="Close" onclick="closeQr()">×</button>
    </div>
    <div class="modal-body">
      <div id="qrBox" style="display:flex;justify-content:center;padding:10px 0;"></div>
      <div style="text-align:center;color:#6b7280;font-size:13px;" id="qrHint">Scan to view patient summary</div>
      <div class="modal-actions" style="justify-content:center;">
        <button class="btn-secondary" onclick="copyQrLink()">Copy Link</button>
        <button class="btn-primary" onclick="openQrLink()">Open Link</button>
      </div>
    </div>
  </div>
</div>

<script src="/js/config.js"></script>
<script src="/js/storage.js"></script>
<script src="/js/seed.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/users.js"></script>
<script src="/js/patient-store.js?v=3.2"></script>
<script src="/js/manufacturing.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>
auth.requireRole(['STORE', 'STORE_APPROVER']);
const me = auth.getCurrentUser();
const isApprover = (me.role === 'STORE_APPROVER');

// Reflect role in the heading
window.addEventListener('DOMContentLoaded', () => {
  const h = document.getElementById('queueTitle');
  if (h) h.textContent = isApprover ? 'Approval Queue' : 'Production Queue';
  const chip = document.getElementById('roleChip');
  if (chip) chip.textContent = isApprover ? 'Store Approver' : 'Store Manager';
});

let _activeFilter = 'ALL';

function setFilter(f) {
  _activeFilter = f;
  ['ALL','APPROVED','PENDING','PROCESSING','DISPATCHED'].forEach(k => {
    const btn = document.getElementById('tab-' + k);
    if (!btn) return;
    btn.classList.toggle('active', k === f);
    btn.disabled = false;
  });
  render();
}

function getUserName(id){
  const users = userService.getUsers();
  const u = users.find(x => x.id === id);
  return u ? u.name : '-';
}

function statusClass(s){
  return manufacturingService.WORKFLOW.badgeClass(s);
}

const _btnAmber = 'padding:5px 10px;font-size:11px;border-radius:5px;border:1px solid #f59e0b;background:#fffbeb;color:#92400e;font-weight:600;cursor:pointer;';
const _btnGreen = 'padding:5px 10px;font-size:11px;border-radius:5px;border:1px solid #16a34a;background:#f0fdf4;color:#15803d;font-weight:600;cursor:pointer;';
const _btnRed   = 'padding:5px 10px;font-size:11px;border-radius:5px;border:1px solid #dc2626;background:#fef2f2;color:#b91c1c;font-weight:600;cursor:pointer;';

function statusActionBtn(j) {
  const W = manufacturingService.WORKFLOW;
  const s = (j.status || 'APPROVED').toUpperCase();

  // ── Store Approver view ──────────────────────────────────────────────
  if (isApprover) {
    const p = W.pending[s];
    if (p) {
      return `<div style="display:flex;gap:6px;flex-wrap:wrap;">
        <button onclick="event.stopPropagation(); approveStep('${j.id}')" style="${_btnGreen}">Approve ${p.label}</button>
        <button onclick="event.stopPropagation(); rejectStep('${j.id}')" style="${_btnRed}">Reject</button>
      </div>`;
    }
    if (s === 'DISPATCHED') return `<span style="font-size:11px;color:#16a34a;font-weight:700;">✓ Dispatched</span>`;
    return `<span style="font-size:11px;color:#94a3b8;">Awaiting manager</span>`;
  }

  // ── Store Manager view ───────────────────────────────────────────────
  if (W.isPending(s)) {
    return `<span style="font-size:11px;color:#d97706;font-weight:700;">⏳ Awaiting approval</span>`;
  }
  const req = W.requestFor(s);
  if (req) {
    const label = (req.next === 'PENDING_PROCESSING') ? 'Request Processing' : 'Request Dispatch';
    const style = (req.next === 'PENDING_PROCESSING') ? _btnAmber : _btnGreen;
    return `<button onclick="event.stopPropagation(); requestStep('${j.id}', '${req.next}')" style="${style}">${label}</button>`;
  }
  return `<span style="font-size:11px;color:#16a34a;font-weight:700;">✓ Dispatched</span>`;
}

function render(){
  const tbody = document.getElementById('jobTable');
  tbody.innerHTML='';

  if(!me.storeId){
    tbody.innerHTML = '<tr><td colspan="7" style="padding:20px;color:#94a3b8;font-style:italic;">Loading store assignment...</td></tr>';
    const apiBase = (typeof CONFIG !== 'undefined' && CONFIG.API_BASE_URL) ? CONFIG.API_BASE_URL : '';
    fetch(apiBase + '/api/users', { headers: { Authorization: 'Bearer ' + me.token } })
      .then(r => r.json())
      .then(users => {
        const serverUser = users.find(u => u.id === me.id);
        if (serverUser && serverUser.storeId) {
          me.storeId = serverUser.storeId;
          const session = Object.assign({}, me);
          db.setTable('session', session);
          render();
        } else {
          tbody.innerHTML = '<tr><td colspan="7" style="padding:20px;color:#dc2626;font-weight:600;">This account is not assigned to a store. Please ask the Admin to go to Admin → Mappings and assign a store to your account.</td></tr>';
        }
      })
      .catch(() => {
        tbody.innerHTML = '<tr><td colspan="7" style="padding:20px;color:#dc2626;font-weight:600;">This account is not assigned to a store. Please ask the Admin to go to Admin → Mappings and assign a store to your account.</td></tr>';
      });
    return;
  }

  let jobs = manufacturingService.getJobsForStore(me.storeId);
  jobs.sort((a,b)=> (b.updatedAt||'').localeCompare(a.updatedAt||''));

  // Apply filter
  if (_activeFilter === 'PENDING') {
    jobs = jobs.filter(j => manufacturingService.WORKFLOW.isPending(j.status));
  } else if (_activeFilter !== 'ALL') {
    jobs = jobs.filter(j => (j.status || 'APPROVED').toUpperCase() === _activeFilter);
  }

  if(jobs.length === 0){
    tbody.innerHTML = `<tr><td colspan="7" style="padding:20px;color:#94a3b8;font-style:italic;">No ${_activeFilter === 'ALL' ? '' : _activeFilter.toLowerCase() + ' '}jobs.</td></tr>`;
    return;
  }

  jobs.forEach(j => {
    const p = getPatientById(j.patientId);
    if(!p) return;

    const main = document.createElement('tr');
    main.className = 'clickable-row';
    main.innerHTML = `
      <td>${getUserName(j.doctorId)}</td>
      <td><a href="javascript:void(0)" class="link" onclick="showQr('${p.id}'); event.stopPropagation();">${p.name}</a></td>
      <td>${p.age ? p.age + ' yr' : '-'} / ${p.sex || '-'}</td>
      <td>${p.uhic || '-'}</td>
      <td>${p.cancer}</td>
      <td><span class="status ${statusClass(j.status)}">${manufacturingService.WORKFLOW.statusLabel(j.status)}</span></td>
      <td>
        <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-start;">
          <div style="display:flex;gap:6px;flex-wrap:wrap;">
            <a href="/patients/profile?id=${p.id}&store=1" class="btn-primary" style="padding:6px 12px;font-size:12px;border-radius:6px;" onclick="event.stopPropagation();">View Plan</a>
            <button class="btn-warning" onclick="event.stopPropagation(); openPdf('${p.id}')" style="padding:6px 12px;font-size:12px;border-radius:6px;">PDF</button>
          </div>
          <div style="display:flex;gap:6px;flex-wrap:wrap;">
            ${statusActionBtn(j)}
          </div>
        </div>
      </td>
    `;
    tbody.appendChild(main);
  });
}

// Manager requests the next step → job enters a PENDING_* state for approval.
async function requestStep(jobId, next) {
  await manufacturingService.updateJobStatus(jobId, next, { by: me.id, role: me.role, action: 'request' });
  render();
}

// Approver approves a pending request → job advances to the real state.
async function approveStep(jobId) {
  const job = manufacturingService.getJobs().find(j => j.id === jobId);
  if (!job) return;
  const p = manufacturingService.WORKFLOW.pending[(job.status || '').toUpperCase()];
  if (!p) return;
  await manufacturingService.updateJobStatus(jobId, p.approve, { by: me.id, role: me.role, action: 'approve' });
  render();
}

// Approver rejects a pending request → job reverts to the previous state.
async function rejectStep(jobId) {
  const job = manufacturingService.getJobs().find(j => j.id === jobId);
  if (!job) return;
  const W = manufacturingService.WORKFLOW;
  const p = W.pending[(job.status || '').toUpperCase()];
  if (!p) return;
  if (!confirm('Reject this request? The job will revert to "' + W.statusLabel(p.reject) + '".')) return;
  await manufacturingService.updateJobStatus(jobId, p.reject, { by: me.id, role: me.role, action: 'reject' });
  render();
}

function openPdf(patientId){
  const url = `/patients/profile?id=${encodeURIComponent(patientId)}&print=1`;
  window.open(url, '_blank', 'noopener');
}

// render() called from polling init below

let __qrCurrentLink = '';

function getBaseUrlForQr(){
  try{
    const cfg = localStorage.getItem('onvilox_public_base_url');
    if(cfg && /^https?:\/\//i.test(cfg)) return cfg.replace(/\/$/,'');
  }catch(e){}
  
  // Always use an absolute URL so phones can scan
  let base = window.location.origin;
  
  if(base === 'null' || base === 'file://'){
    return 'http://192.168.1.8:8000'; // Fallback
  }
  
  const path = window.location.pathname;
  const dir = path.substring(0, path.lastIndexOf('/'));
  return base + dir;
}

function buildQrLink(patientId){
  const base = getBaseUrlForQr();
  return `${base}/patient-qr.html?id=${encodeURIComponent(patientId)}`;
}


function showQr(patientId){
  const p = getPatientById(patientId);
  const title = p ? `QR for ${p.name}` : 'Patient QR';
  document.getElementById('qrTitle').innerText = title;

  const link = buildQrLink(patientId);
  __qrCurrentLink = link;

  const box = document.getElementById('qrBox');
  box.innerHTML = '';
  new QRCode(box, { text: link, width: 220, height: 220 });

  const isFile = (window.location.origin === 'null');
  if(isFile && !localStorage.getItem('onvilox_public_base_url')){
    document.getElementById('qrHint').innerText = 'Warning: Local URLs cannot be scanned by phones. Ensure you are running this on a reachable IP address (e.g. your WiFi IP) and set localStorage key "onvilox_public_base_url".';
  }else{
    document.getElementById('qrHint').innerText = 'Scan to view patient report';
  }
  document.getElementById('qrOverlay').style.display = 'flex';
}

function closeQr(){
  const ov = document.getElementById('qrOverlay');
  if(ov) ov.style.display = 'none';
}

async function copyQrLink(){
  if(!__qrCurrentLink) return;
  try{
    await navigator.clipboard.writeText(__qrCurrentLink);
    document.getElementById('qrHint').innerText = 'Link copied ✅';
  }catch(e){
    prompt('Copy this link:', __qrCurrentLink);
  }
}

function openQrLink(){
  if(!__qrCurrentLink) return;
  window.open(__qrCurrentLink, '_blank', 'noopener');
}

// ── NOTIFICATION POLLING ──────────────────────────────────────────────────
let _knownJobIds = new Set();
let _jobStatusMap = {}; // jobId -> last seen status, for change detection
let _notifPermission = false;

function _initNotifications() {
  if (!('Notification' in window)) return;
  if (Notification.permission === 'granted') {
    _notifPermission = true;
  } else if (Notification.permission !== 'denied') {
    Notification.requestPermission().then(p => { _notifPermission = (p === 'granted'); });
  }
}

function _pollJobs() {
  const apiBase = (typeof CONFIG !== 'undefined' && CONFIG.API_BASE_URL) ? CONFIG.API_BASE_URL : '';
  fetch(apiBase + '/api/manufacturing-jobs', { headers: { Authorization: 'Bearer ' + me.token } })
    .then(r => r.ok ? r.json() : [])
    .then(jobs => {
      if (!me.storeId) return;
      const W = manufacturingService.WORKFLOW;
      const myJobs = jobs.filter(j => j.store_id === me.storeId || j.storeId === me.storeId);
      const seeded = _knownJobIds.size > 0;
      let changed = false;

      myJobs.forEach(j => {
        const status = (j.status || 'APPROVED').toUpperCase();
        const prev = _jobStatusMap[j.id];
        const p = getPatientById(j.patient_id || j.patientId);
        const name = p ? p.name : 'A patient';

        // New job appeared
        if (!_knownJobIds.has(j.id)) {
          if (seeded && !isApprover && status === 'APPROVED') {
            _showNotification('New Patient Approved', `${name} is ready for production.`, 'pending');
          }
          _knownJobIds.add(j.id);
          changed = true;
        } else if (prev && prev !== status) {
          // Status changed since last poll
          changed = true;
          if (isApprover && W.isPending(status)) {
            // An item now needs the approver's sign-off → urgent chime.
            _showNotification('Approval Needed', `${name}: ${W.statusLabel(status)}.`, 'pending');
          } else if (!isApprover && W.isPending(prev)) {
            // Manager's pending request was resolved by the approver → info ping.
            if (status === 'PROCESSING' || status === 'DISPATCHED') {
              _showNotification('Request Approved', `${name} moved to ${W.statusLabel(status)}.`, 'info');
            } else {
              _showNotification('Request Rejected', `${name} reverted to ${W.statusLabel(status)}.`, 'info');
            }
          }
        }
        _jobStatusMap[j.id] = status;
      });

      // Refresh the in-memory job cache with the freshly-fetched rows so that
      // render() reflects server truth (e.g. an approval done on another device).
      if (manufacturingService.applyServerJobs) manufacturingService.applyServerJobs(jobs);

      if (seeded && changed) render();
    }).catch(() => {});
}

// ── Custom alert sound (Web Audio) ─────────────────────────────────────────
// Browsers won't let Notifications play a custom sound, so we synthesize our
// own tone. 'pending' = an urgent rising 3-note chime that signals "something
// needs YOUR action"; 'info' = a softer 2-note ping for status updates.
let _audioCtx = null;
function _ensureAudio() {
  try {
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if (!Ctx) return null;
    if (!_audioCtx) _audioCtx = new Ctx();
    if (_audioCtx.state === 'suspended') _audioCtx.resume();
    return _audioCtx;
  } catch(e) { return null; }
}
// Resume audio on the first user interaction (autoplay policy requirement).
['click','keydown','touchstart'].forEach(ev =>
  window.addEventListener(ev, _ensureAudio, { once: true }));

function _playChime(kind) {
  const ctx = _ensureAudio();
  if (!ctx) return;
  const now = ctx.currentTime;
  const notes = (kind === 'pending') ? [880, 1175, 1568] : [659, 988];
  const gap   = (kind === 'pending') ? 0.16 : 0.14;
  const reps  = (kind === 'pending') ? 2 : 1; // pending plays twice for urgency
  for (let r = 0; r < reps; r++) {
    notes.forEach((f, i) => {
      const t = now + r * (notes.length * gap + 0.18) + i * gap;
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = 'sine';
      o.frequency.value = f;
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(0.28, t + 0.025);
      g.gain.exponentialRampToValueAtTime(0.0001, t + gap + 0.05);
      o.connect(g); g.connect(ctx.destination);
      o.start(t); o.stop(t + gap + 0.08);
    });
  }
}

function _showNotification(title, body, kind) {
  // Distinct custom sound (so it's clearly different from the system default).
  _playChime(kind);

  // Only raise an OS notification when the tab is NOT visible — otherwise the
  // in-page toast below already informs the user, and showing both is noisy.
  if (_notifPermission && document.hidden) {
    try { new Notification(title, { body, icon: '/favicon.ico', silent: true }); } catch(e) {}
  }

  // In-page toast (amber + ⏳ for pending action items, navy otherwise).
  const pending = (kind === 'pending');
  const toast = document.createElement('div');
  toast.style.cssText = 'position:fixed;top:70px;right:20px;color:#fff;padding:14px 20px;border-radius:8px;z-index:9999;font-size:14px;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,0.3);max-width:320px;background:' + (pending ? '#b45309' : '#0e2247') + ';';
  toast.innerHTML = `<div style="font-weight:700;margin-bottom:4px;">${pending ? '⏳' : '🔔'} ${title}</div><div style="font-size:12px;opacity:0.9;">${body}</div>`;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), pending ? 9000 : 6000);
}

async function testPushNotification() {
  const apiBase = (typeof CONFIG !== 'undefined' && CONFIG.API_BASE_URL) ? CONFIG.API_BASE_URL : '';
  try {
    const res = await fetch(apiBase + '/api/push/test', {
      method: 'POST',
      headers: { Authorization: 'Bearer ' + me.token }
    });
    const data = await res.json();
    if (res.ok) {
      alert('✅ Test notification sent! You should receive it on your device within a few seconds.');
    } else {
      alert('❌ Failed: ' + data.error + '\n\nMake sure you have allowed notifications and the store dashboard has been open at least once.');
    }
  } catch(e) {
    alert('❌ Error: ' + e.message);
  }
}

function _updateNotifStatus() {
  const el = document.getElementById('notifStatus');
  if (!el) return;
  if (!('Notification' in window)) {
    el.textContent = '🔕 Notifications not supported on this browser';
    el.style.color = '#dc2626';
  } else if (Notification.permission === 'granted') {
    el.textContent = '🔔 Notifications: Enabled';
    el.style.color = '#16a34a';
  } else if (Notification.permission === 'denied') {
    el.textContent = '🔕 Notifications: Blocked — go to browser settings to enable';
    el.style.color = '#dc2626';
  } else {
    el.textContent = '🔔 Notifications: Not yet enabled — tap to allow';
    el.style.color = '#d97706';
    el.style.cursor = 'pointer';
    el.onclick = () => Notification.requestPermission().then(() => _updateNotifStatus());
  }
}

// When the app is open, the service worker hands push messages to the page
// (instead of showing a duplicate OS notification) so we can play the custom
// chime + in-page toast. 'Approval Needed' alerts use the urgent 'pending' sound.
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.addEventListener('message', (e) => {
    const msg = e.data || {};
    if (msg.type !== 'push') return;
    const d = msg.data || {};
    const kind = /approval needed|awaiting/i.test((d.title || '') + ' ' + (d.body || '')) ? 'pending' : 'info';
    _showNotification(d.title || 'Update', d.body || '', kind);
    render();
  });
}

// Start polling after page loads
initStore().then(() => {
  render();
  _initNotifications();
  _updateNotifStatus();
  _pollJobs(); // seed known job IDs (no notification on first load)
  setInterval(_pollJobs, 30000); // check every 30 seconds
});

</script>
