<!DOCTYPE html>
<html>
<head>
  <title>Onvilox Login</title>
  <link rel="stylesheet" href="css/app.css?v=2.0">
  <link rel="stylesheet" href="css/login.css">
</head>
<body>

<!-- Theme JS to apply background fast before render -->
<script src="js/theme.js"></script>

<div class="login-page">
  <div style="position: absolute; top: 25px; right: 30px; z-index: 10;">
    <button id="themeToggleBtn" onclick="toggleTheme()" class="btn-secondary btn-sm" style="border-radius: 30px; font-weight: 600; padding: 8px 16px; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2);">🌙 Dark Mode</button>
  </div>

  <div class="login-hero">
    <div class="overlay"></div>

    <div class="hero-content">
      <div class="logo-animation">
        <span>Onvilox</span>
      </div>
      <h2>Custom Protein Builder</h2>
      <p>Clinician-Facing Platform</p>
    </div>
  </div>

  <div class="login-panel">
    <div class="login-card">

      <h2>Login</h2>

      <div class="form-group">
        <label>Username</label>
        <input id="username" type="text" placeholder="admin">
      </div>

      <div class="form-group">
        <label>Password</label>
        <input id="password" type="password" placeholder="Enter password">
      </div>

      <div id="errorBox" style="color:#ef4444;font-weight:600;margin-top:8px;"></div>

      <div class="login-actions">
        <button class="btn-primary" onclick="handleLogin()">
          Login
        </button>
      </div>

      <div style="margin-top:16px;font-size:13px;color:#6b7280;">
        MVP default admin: <b>admin / admin2026</b>
      </div>

    </div>
  </div>

</div>

<script src="js/storage.js"></script>
<script src="js/seed.js"></script>
<script src="js/auth.js"></script>

<script>
function handleLogin(){
  const u = document.getElementById('username').value;
  const p = document.getElementById('password').value;
  const res = auth.login(u,p);
  if(!res.ok){
    document.getElementById('errorBox').innerText = res.error;
    return;
  }
  window.location.href = res.route;
}

// enter key
['username','password'].forEach(id=>{
  document.getElementById(id).addEventListener('keydown', (e)=>{
    if(e.key === 'Enter') handleLogin();
  });
});
</script>

</body>
</html>
