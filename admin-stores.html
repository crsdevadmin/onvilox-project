<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stores - Gquence</title>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>

<div class="topbar">
  <div class="logo">Gquence Admin</div>
  <div class="nav">
    <a href="/admin">Dashboard</a>
    <a href="/admin/stores">Stores</a>
    <a href="/admin/users">Create Users</a>
    <a href="/admin/mapping">Mapping</a>
    <a href="/admin/tracking">Tracking</a>
    <a href="/admin/trials">Clinical Trials</a>
    <a href="/admin/reports">Reports</a>
    <a href="/admin/rules">Rule Engine</a>
    <a href="#" onclick="auth.logout()">Logout</a>
    <button id="themeToggleBtn" onclick="toggleTheme()" class="btn-secondary btn-sm" style="margin-left: 20px; border-radius: 30px; padding: 6px 14px; cursor: pointer;">🌙 Dark Mode</button>
  </div>
</div>

<div class="container page">

  <div class="card">
    <h2>Store Master</h2>

    <div class="form-grid">
      <div class="form-group">
        <label class="required" for="storeName">Store Name</label>
        <input id="storeName" type="text" placeholder="Central Pharma Store" onkeyup="validateStoreName()" onblur="validateStoreName()">
        <div class="validation-msg" id="storeName_msg"></div>
      </div>
      <div class="form-group">
        <label class="required" for="storeFssai">FSSAI Licence No.</label>
        <input id="storeFssai" type="text" inputmode="numeric" maxlength="14" placeholder="14-digit FSSAI number" onkeyup="validateStoreFssai()" onblur="validateStoreFssai()">
        <div class="validation-msg" id="storeFssai_msg"></div>
      </div>
      <div class="form-group">
        <label for="storeLocation">Location</label>
        <input id="storeLocation" type="text" placeholder="Chennai">
      </div>
      <div class="form-group">
        <label for="storeHospital">Hospital</label>
        <input id="storeHospital" type="text" list="hospitalList" autocomplete="off" placeholder="Type to search or add a hospital">
        <datalist id="hospitalList"></datalist>
        <div style="font-size:11.5px;color:var(--text-2,#64748b);margin-top:3px;">Pick an existing hospital to avoid duplicates, or type a new name.</div>
      </div>
      <div class="form-group" style="grid-column:1 / -1;">
        <label for="storeAddress">Address <span style="font-weight:400;color:#64748b;font-size:12px;">(printed on product labels as "Manufactured by")</span></label>
        <textarea id="storeAddress" rows="2" placeholder="Full address incl. street, city, state, PIN"></textarea>
      </div>
    </div>

    <div id="storeError" style="color:#ef4444;font-weight:600;margin-top:8px;"></div>

    <div style="margin-top:18px;">
      <button class="btn-primary" onclick="createStoreUI()">Create Store</button>
    </div>
  </div>

  <div class="card">
    <h2>All Stores</h2>
    <table>
      <thead>
        <tr>
          <th>Store</th>
          <th>FSSAI No.</th>
          <th>Location</th>
          <th>Store Login</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="storeTable"></tbody>
    </table>
  </div>

</div>

<script src="/js/config.js"></script>
<script src="/js/storage.js"></script>
<script src="/js/seed.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/stores.js"></script>
<script src="/js/users.js"></script>

<script>
auth.requireRole(['SUPER_ADMIN', 'ADMIN']);

// Populate the hospital combobox with existing hospitals (reduces duplicate/typo entries).
const _apiBase = (typeof CONFIG !== 'undefined' && CONFIG.API_BASE_URL) ? CONFIG.API_BASE_URL : '';
(async function _loadHospitalSuggestions(){
  try {
    const me = auth.getCurrentUser();
    const res = await fetch(_apiBase + '/api/hospitals', { headers: { 'Authorization': 'Bearer ' + (me && me.token || '') } });
    if(!res.ok) return;
    const list = await res.json();
    const dl = document.getElementById('hospitalList');
    if(dl) dl.innerHTML = (list || []).map(h => `<option value="${String(h.name||'').replace(/"/g,'&quot;')}"></option>`).join('');
  } catch(e){ /* suggestions are optional */ }
})();

function validateStoreName(){
  const el = document.getElementById('storeName');
  const msg = document.getElementById('storeName_msg');
  const val = (el.value||'').trim();
  if(!val){
    el.classList.add('field-invalid');
    el.classList.remove('field-valid');
    msg.className = 'validation-msg validation-error';
    msg.innerText = 'Store Name is required';
    return false;
  }
  if(val.length < 3){
    el.classList.add('field-invalid');
    el.classList.remove('field-valid');
    msg.className = 'validation-msg validation-error';
    msg.innerText = 'Enter a valid store name';
    return false;
  }
  el.classList.add('field-valid');
  el.classList.remove('field-invalid');
  msg.className = 'validation-msg validation-success';
  msg.innerText = '✓ Looks good';
  return true;
}

function renderStores(){
  const stores = storeService.getStores();
  const tbody = document.getElementById('storeTable');
  tbody.innerHTML = '';

  const users = userService.getUsers();

  stores.forEach(s => {
    const storeUser = users.find(u => u.role === 'STORE' && u.storeId === s.id);
    const loginText = storeUser ? storeUser.username : '<span style="color:#ef4444;font-weight:600;">No login</span>';

    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${s.name}</td>
      <td>${s.fssai_number || s.fssai || '-'}</td>
      <td>${s.location || '-'}</td>
      <td>${loginText}</td>
      <td style="display:flex;gap:10px;flex-wrap:wrap;">
        ${storeUser ? `<button class="btn-warning" onclick="resetStorePassword('${storeUser.id}')">Reset Password</button>` : ``}
        <button class="btn-secondary" onclick="deleteStoreUI('${s.id}')">Delete</button>
      </td>
    `;
    tbody.appendChild(tr);
  });

  if(stores.length === 0){
    tbody.innerHTML = '<tr><td colspan="5">No stores created yet.</td></tr>';
  }
}

function validateStoreFssai(){
  const el = document.getElementById('storeFssai');
  const msg = document.getElementById('storeFssai_msg');
  const val = (el.value||'').trim();
  if(!val){
    el.classList.add('field-invalid'); el.classList.remove('field-valid');
    msg.className = 'validation-msg validation-error';
    msg.innerText = 'FSSAI licence number is required';
    return false;
  }
  if(!/^\d{14}$/.test(val)){
    el.classList.add('field-invalid'); el.classList.remove('field-valid');
    msg.className = 'validation-msg validation-error';
    msg.innerText = 'FSSAI number must be exactly 14 digits';
    return false;
  }
  el.classList.add('field-valid'); el.classList.remove('field-invalid');
  msg.className = 'validation-msg validation-success';
  msg.innerText = '✓ Looks good';
  return true;
}

async function createStoreUI(){
  if(!validateStoreName()) return;
  if(!validateStoreFssai()) return;
  const name = document.getElementById('storeName').value;
  const fssai = document.getElementById('storeFssai').value;
  const location = document.getElementById('storeLocation').value;
  const address = document.getElementById('storeAddress').value;
  const hospital = (document.getElementById('storeHospital') || {}).value || '';

  const res = await storeService.createStore({name, fssai, hospital, location, address});
  if(!res.ok){
    document.getElementById('storeError').innerText = res.error;
    return;
  }
  document.getElementById('storeError').innerText = '';
  if(res && res.storeLogin){
    alert(
      'Store created. Store Login Credentials:\n\n' +
      'Username: ' + res.storeLogin.username + '\n' +
      'Password: ' + res.storeLogin.password + '\n\n' +
      '(Share this with the Store user.)'
    );
  }
  document.getElementById('storeName').value='';
  document.getElementById('storeFssai').value='';
  document.getElementById('storeFssai_msg').innerText='';
  document.getElementById('storeFssai').classList.remove('field-valid','field-invalid');
  document.getElementById('storeLocation').value='';
  document.getElementById('storeAddress').value='';
  renderStores();
}

async function resetStorePassword(userId){
  const res = await userService.resetUserPassword(userId);
  if(!res.ok){ alert(res.error || 'Unable to reset password'); return; }
  alert('New Store Login Password\n\nUsername: ' + res.user.username + '\nPassword: ' + res.password + '\n\nPlease share securely.');
  renderStores();
}

async function deleteStoreUI(id){
  const res = await storeService.deleteStore(id);
  if(res && res.ok === false){
    document.getElementById('storeError').innerText = res.error;
    return;
  }
  document.getElementById('storeError').innerText = '';
  renderStores();
}

(async () => {
  await storeService.initStores();
  await userService.initUsers();
  renderStores();
})();
</script>

<script src="/js/theme.js"></script>
</body>
</html>
