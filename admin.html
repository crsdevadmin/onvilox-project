<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Gquence</title>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>

<div class="topbar">
  <div class="logo">Gquence Admin</div>
  <div class="nav">
    <a href="/admin">Dashboard</a>
    <a href="/admin/stores">Stores</a>
    <a href="/admin/users">Create Users</a>
    <a href="/admin/mapping">Mapping</a>
    <a href="/admin/tracking">Tracking</a>
    <a href="/admin/trials">Clinical Trials</a>
    <a href="/admin/reports">Reports</a>
    <a href="/admin/rules">Rule Engine</a>
    <a href="#" onclick="auth.logout()">Logout</a>
    <button id="themeToggleBtn" onclick="toggleTheme()" class="btn-secondary btn-sm" style="margin-left: 20px; border-radius: 30px; padding: 6px 14px; cursor: pointer;">🌙 Dark Mode</button>
  </div>
</div>

<div class="container page">

  <div class="page-header" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;">
    <div>
      <h1 class="page-title">System Overview</h1>
      <div class="page-subtitle">Real-time metrics across all facilities</div>
    </div>
    <button class="btn-primary" onclick="syncJobs(this)" title="Create missing production jobs for approved patients and show a diagnostic">Sync Production Jobs</button>
  </div>

  <div id="syncResult" style="display:none;margin-bottom:16px;font-size:13px;"></div>

  <div class="kpis">
    <div class="kpi-card">
      <div class="kpi-label">Total Doctors</div>
      <div class="kpi-value" id="tDoctors">0</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Total Stores</div>
      <div class="kpi-value" id="tStores">0</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Total Patients</div>
      <div class="kpi-value" id="tPatients">0</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Pending Approval</div>
      <div class="kpi-value" id="tPending">0</div>
    </div>
  </div>

  <div class="kpis">
    <div class="kpi-card">
      <div class="kpi-label">Processing</div>
      <div class="kpi-value" id="tProcessing">0</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Ready</div>
      <div class="kpi-value" id="tReady">0</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Dispatched</div>
      <div class="kpi-value" id="tDispatched">0</div>
    </div>
    <div class="kpi-card" style="border-color: rgba(16, 185, 129, 0.4);">
      <div class="kpi-label" style="color: var(--success);">Delivered</div>
      <div class="kpi-value" id="tDelivered">0</div>
    </div>
  </div>

</div>

<script src="/js/config.js"></script>
<script src="/js/storage.js"></script>
<script src="/js/seed.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/users.js"></script>
<script src="/js/stores.js"></script>
<script src="/js/manufacturing.js"></script>
<script src="/js/patient-store.js?v=3.2"></script>

<script>
auth.requireRole(['SUPER_ADMIN', 'ADMIN']);

// Load DB data first, then populate dashboard
initStore().then(() => {
const doctors = (typeof userService !== 'undefined') ? userService.getUsersByRole('DOCTOR') : [];
const stores = (typeof storeService !== 'undefined') ? storeService.getStores() : [];
const patients = getPatients();
const jobs = (typeof manufacturingService !== 'undefined') ? manufacturingService.getJobs() : [];

function countJobs(status){
  return jobs.filter(j => j.status === status).length;
}

// Pending approval = patient status CREATED
const pending = patients.filter(p => p.status === 'CREATED').length;

document.getElementById('tDoctors').innerText = doctors.length;
document.getElementById('tStores').innerText = stores.length;
document.getElementById('tPatients').innerText = patients.length;
document.getElementById('tPending').innerText = pending;
document.getElementById('tProcessing').innerText = countJobs('PROCESSING');
document.getElementById('tReady').innerText = countJobs('READY');
document.getElementById('tDispatched').innerText = countJobs('DISPATCHED');
document.getElementById('tDelivered').innerText = countJobs('DELIVERED');
}); // end initStore().then

// Manually reconcile production jobs (creates missing jobs for approved patients)
// and render a diagnostic so mismatches are easy to spot.
async function syncJobs(btn){
  const apiBase = (typeof CONFIG !== 'undefined' && CONFIG.API_BASE_URL) ? CONFIG.API_BASE_URL : '';
  const me = auth.getCurrentUser();
  const box = document.getElementById('syncResult');
  if(btn){ btn.disabled = true; btn.textContent = 'Syncing...'; }
  try {
    const res = await fetch(apiBase + '/api/admin/reconcile-jobs', {
      method: 'POST', headers: { 'Content-Type':'application/json', 'Authorization': 'Bearer ' + me.token }
    });
    const data = await res.json();
    if(!res.ok) throw new Error(data.error || 'Server error');

    const storeName = {};
    (storeService.getStores() || []).forEach(s => { storeName[s.id] = s.name; });
    const sid = (id) => id ? (storeName[id] || id) : '<span style="color:#dc2626;">(none)</span>';

    let html = `<div class="card"><b>Sync complete.</b> Created ${data.created} new job(s).`;

    // Rows the sync could not create, with the exact reason
    if ((data.skipped || []).length) {
      html += `<div style="margin-top:8px;color:#dc2626;"><b>${data.skipped.length} could not be created:</b><ul style="margin:6px 0 0 18px;">`;
      data.skipped.forEach(s => { html += `<li>${s.patient} — ${s.reason}</li>`; });
      html += `</ul></div>`;
    }

    // Patients still without a job after sync (problem cases)
    const orphans = (data.approvedPatients || []).filter(p => !p.has_job);
    if (orphans.length) {
      html += `<div style="margin-top:8px;color:#b45309;"><b>${orphans.length} approved patient(s) still without a job</b> (usually a missing/orphaned store mapping):<ul style="margin:6px 0 0 18px;">`;
      orphans.forEach(p => { html += `<li>${p.name || p.id} — status ${p.status||'?'}, store ${sid(p.store_id)}</li>`; });
      html += `</ul></div>`;
    }

    // Store-id cross-check: jobs vs the store/approver users
    const userStores = new Set((data.storeUsers||[]).filter(u=>u.role==='STORE'||u.role==='STORE_APPROVER').map(u=>u.store_id).filter(Boolean));
    const jobStores = new Set((data.jobs||[]).map(j=>j.store_id).filter(Boolean));
    const unmatched = [...jobStores].filter(s => !userStores.has(s));
    if (unmatched.length) {
      html += `<div style="margin-top:8px;color:#dc2626;"><b>Warning:</b> ${unmatched.length} job store(s) have no Store Manager/Approver mapped to them: ${unmatched.map(sid).join(', ')}. Map a store user to these in Admin → Mapping.</div>`;
    }

    html += `<div style="margin-top:8px;color:#475569;">Approved patients: ${ (data.approvedPatients||[]).length } · Jobs total: ${ (data.jobs||[]).length }</div></div>`;
    box.innerHTML = html;
    box.style.display = 'block';
  } catch(e) {
    box.innerHTML = `<div class="card" style="color:#dc2626;">Sync failed: ${e.message}</div>`;
    box.style.display = 'block';
  } finally {
    if(btn){ btn.disabled = false; btn.textContent = 'Sync Production Jobs'; }
  }
}
</script>

<script src="/js/theme.js"></script>
</body>
</html>
